name: CMake on a Linux runner

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-linux:
    name: ${{ matrix.compiler }} / ${{ matrix.build-type }}
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
        build-type: [Debug, Release]
        include:
          - compiler: gcc
            cc: gcc
            cxx: g++
            extra-flags: "-Wno-format-truncation"
          - compiler: clang
            cc: clang
            cxx: clang++
            extra-flags: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            build-essential clang cmake git ninja-build

      - name: CMake configure
        run: |
          cmake -S . -B build -G Ninja \
            -DDNP3_TLS=OFF \
            -DDNP3_TESTS=ON \
            -DDNP3_EXAMPLES=ON \
            -DDNP3_FUZZING=ON \
            -DDNP3_JAVA=OFF \
            -DDNP3_STATIC_LIBS=ON \
            -DDNP3_COVERAGE=OFF \
            -DCMAKE_BUILD_TYPE=${{ matrix.build-type }} \
            -DCMAKE_C_COMPILER=${{ matrix.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} \
            -DCMAKE_CXX_FLAGS="-Wall -Wextra -Wno-unused-parameter ${{ matrix.extra-flags }}" \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install

      - name: CMake build
        run: cmake --build build --parallel

      - name: Run C++ tests
        working-directory: build
        run: ctest --output-on-failure

      - name: Package build
        run: cmake --install build

      - name: Upload package
        uses: actions/upload-artifact@v7
        with:
          name: opendnp3-linux-x64-${{ matrix.compiler }}-${{ matrix.build-type }}-${{ github.sha }}
          path: install
          if-no-files-found: error
          retention-days: 14

  coverage:
    name: Code coverage
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            build-essential cmake curl git lcov libssl-dev ninja-build

      - name: CMake configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DDNP3_TESTS=ON \
            -DDNP3_COVERAGE=ON

      - name: Build and run tests with code coverage
        run: cmake --build build --target coverage --parallel

      - name: Upload coverage to Codecov
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@v4
        with:
          files: build/coverage.info.cleaned
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
